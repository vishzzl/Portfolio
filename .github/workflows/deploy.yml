name: Node.js CI + Deploy

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Deploy to another repository
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.deploymentKey }}
          publish_dir: ./out
          external_repository: vishzzl/vishzzl.github.io
          publish_branch: portfolio-2026
